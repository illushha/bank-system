<!DOCTYPE html>
<html>
<body>

<a href="/">⬅ На головну</a>

<h1>Історія транзакцій</h1>

<ul>
  <li th:each="t : ${transactions}">
    <span th:text="${t.fromAccount.number}"></span>
    →
    <span th:text="${t.toAccount.number}"></span>
    :
    <span th:text="${t.amount}"></span>
    (<span th:text="${#temporals.format(t.createdAt, 'dd.MM.yyyy')}"></span>)
  </li>
</ul>

</body>
</html>

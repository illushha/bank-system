<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">

<h1>Новий рахунок</h1>

<a href="/">⬅ На головну</a>
<h1>Новий рахунок</h1>

<form action="/accounts" method="post">

    Номер картки (можна пусто):
    <input type="text" name="number"><br>

    Баланс:
    <input type="number" name="balance"><br>

    Клієнт:
    <select name="clientId">
        <option th:each="c : ${clients}"
                th:value="${c.id}"
                th:text="${c.name}">
        </option>
    </select>

    <br><br>
    <button type="submit">Зберегти</button>

</form>
</div>
</body>
</html>
